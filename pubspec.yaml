name: cropaid_uganda
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'   # Safe modern range

dependencies:
  flutter:
    sdk: flutter

  # Core packages for the app
  tflite_flutter: ^0.12.1
  image_picker: ^1.0.7
  image: ^4.5.4
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.2
  http: ^1.2.2
  intl: ^0.19.0
  geolocator: ^10.1.0
  supabase_flutter: ^2.9.1
  url_launcher: ^6.3.0

  # Optional but nice for UI polish
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/plant_disease_mobilenetv2_quant.tflite
    - assets/labels.txt
    - assets/diseases.json
    - assets/drug_dealers.json
    - assets/images/
